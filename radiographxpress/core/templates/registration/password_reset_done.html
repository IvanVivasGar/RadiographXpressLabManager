{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado - Radiograph Xpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/design-system.css' %}">
    <link rel="stylesheet" href="{% static 'patientsDashboard/login.css' %}">
</head>

<body class="login-body">
    <div class="login-wrapper">
        <div class="login-container" style="max-width: 500px; margin: 0 auto;">
            <div class="login-section" style="padding: 3rem; text-align: center;">
                <div class="login-header">
                    <img src="{% static 'core/assets/img/logos/radiographxpress_logo.png' %}" class="login-logo-img"
                        alt="Radiograph Xpress Logo" style="margin: 0 auto 1.5rem;">
                    <h2>Correo Enviado</h2>
                    <p class="subtitle">
                        Te hemos enviado un correo electrónico con instrucciones para restablecer tu contraseña.
                        Asegúrate de revisar tu carpeta de spam o correo no deseado.
                    </p>
                </div>

                <div style="margin-top: 2rem;">
                    <a href="{% url 'login' %}" class="login-submit-btn"
                        style="text-decoration: none; display: inline-block;">
                        Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
