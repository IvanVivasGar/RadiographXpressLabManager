{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Radiograph Xpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/design-system.css' %}">
    <link rel="stylesheet" href="{% static 'patientsDashboard/login.css' %}">
</head>

<body class="login-body">
    <div class="login-wrapper">
        <div class="login-container" style="max-width: 500px; margin: 0 auto;">
            <div class="login-section" style="padding: 3rem;">
                <div class="login-header">
                    <img src="{% static 'core/assets/img/logos/radiographxpress_logo.png' %}" class="login-logo-img"
                        alt="Radiograph Xpress Logo">
                    <h2>Recuperar Contraseña</h2>
                    <p class="subtitle" style="margin-bottom: 2rem;">Ingresa tu correo electrónico y te enviaremos un
                        enlace para restablecer tu contraseña.</p>
                </div>

                <form method="post" class="login-form">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="error-message">
                        Por favor revisa que el correo sea válido.
                    </div>
                    {% endif %}

                    <div class="form-group">
                        <label for="id_email">Correo Electrónico</label>
                        <input type="email" name="email" class="input-field" placeholder="ejemplo@correo.com" required
                            id="id_email">
                    </div>

                    <button type="submit" class="login-submit-btn" style="margin-top: 1rem;">
                        Enviar enlace de recuperación
                    </button>

                    <div style="text-align: center; margin-top: 2rem;">
                        <a href="{% url 'login' %}"
                            style="color: var(--brand-gradient-start); text-decoration: none; font-size: 14px; font-weight: 500;">
                            ← Volver al inicio de sesión
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
