<!-- WebSocket Notifications with Live DOM Updates -->
<style>
    .ws-toast-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
    }

    .ws-toast {
        pointer-events: auto;
        background: #1e293b;
        color: #f8fafc;
        padding: 14px 20px;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 280px;
        max-width: 400px;
        animation: wsSlideIn 0.35s ease-out;
        border-left: 4px solid #3b82f6;
    }

    .ws-toast.ws-toast-study {
        border-left-color: #3b82f6;
    }

    .ws-toast.ws-toast-report {
        border-left-color: #10b981;
    }

    .ws-toast.ws-toast-locked {
        border-left-color: #f59e0b;
    }

    .ws-toast.ws-toast-request {
        border-left-color: #8b5cf6;
    }

    .ws-toast-icon {
        font-size: 18px;
        flex-shrink: 0;
    }

    .ws-toast-body {
        flex: 1;
    }

    .ws-toast-title {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 2px;
    }

    .ws-toast-message {
        opacity: 0.85;
        font-size: 12px;
    }

    .ws-toast-close {
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        font-size: 16px;
        padding: 0 4px;
        flex-shrink: 0;
    }

    .ws-toast-close:hover {
        color: #f8fafc;
    }

    @keyframes wsSlideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }

        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    @keyframes wsSlideOut {
        from {
            transform: translateX(0);
            opacity: 1;
        }

        to {
            transform: translateX(100%);
            opacity: 0;
        }
    }

    @keyframes wsFadeOut {
        from {
            opacity: 1;
            transform: scale(1);
            max-height: 300px;
            margin-bottom: 10px;
        }

        to {
            opacity: 0;
            transform: scale(0.95);
            max-height: 0;
            margin-bottom: 0;
            padding: 0;
        }
    }

    .ws-toast.ws-removing {
        animation: wsSlideOut 0.3s ease-in forwards;
    }

    .ws-dom-removing {
        animation: wsFadeOut 0.4s ease-in forwards;
        overflow: hidden;
        pointer-events: none;
    }
</style>

<div id="ws-toast-container" class="ws-toast-container"></div>

<script>
    (function () {
        const ICONS = {
            new_study: '🩻',
            report_completed: '✅',
            report_locked: '🔒',
            studies_unlocked: '🔓',
            study_request_created: '📋',
            doctor_pending_approval: 'MD',
            doctor_approved: 'OK',
            doctor_denied: 'X',
            images_available: '🖼️',
            info: 'ℹ️',
        };
        const CSS_CLASS = {
            new_study: 'ws-toast-study',
            report_completed: 'ws-toast-report',
            report_locked: 'ws-toast-locked',
            studies_unlocked: 'ws-toast-study',
            study_request_created: 'ws-toast-request',
            doctor_pending_approval: 'ws-toast-request',
            doctor_approved: 'ws-toast-report',
            doctor_denied: 'ws-toast-locked',
            images_available: 'ws-toast-report',
        };

        // ── Toast display ──
        function showWSToast(type, message, data) {
            const container = document.getElementById('ws-toast-container');
            const toast = document.createElement('div');
            toast.className = `ws-toast ${CSS_CLASS[type] || ''}`;

            const icon = ICONS[type] || ICONS.info;
            const detail = data.patient_name || data.doctor_name || '';

            toast.innerHTML = `
            <span class="ws-toast-icon">${icon}</span>
            <div class="ws-toast-body">
                <div class="ws-toast-title">${message}</div>
                ${detail ? `<div class="ws-toast-message">${detail}</div>` : ''}
            </div>
            <button class="ws-toast-close" onclick="this.parentElement.classList.add('ws-removing'); setTimeout(() => this.parentElement.remove(), 300)">✕</button>
        `;

            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('ws-removing');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 8000);
        }

        // ── DOM update handlers ──

        function removeStudyCards(studyId) {
            // Remove study cards and list items with matching study ID
            const selectors = [
                `[data-study-id="${studyId}"]`,
            ];
            selectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    el.classList.add('ws-dom-removing');
                    setTimeout(() => el.remove(), 400);
                });
            });

            // After removal, check if any studies remain; show empty message if not
            setTimeout(() => {
                checkEmptyContainers();
            }, 500);
        }

        function checkEmptyContainers() {
            // Doctor pending studies grid
            const grid = document.getElementById('studiesGridView');
            if (grid && grid.querySelectorAll('.study-card').length === 0 && !grid.querySelector('.ws-empty-msg')) {
                grid.innerHTML = '<p class="ws-empty-msg" style="text-align: center; width: 100%; color: #999;">No hay estudios pendientes.</p>';
            }

            // Doctor pending studies list
            const list = document.getElementById('studiesListView');
            if (list && list.querySelectorAll('.study-list-item').length === 0 && !list.querySelector('.ws-empty-msg')) {
                list.innerHTML = '<p class="ws-empty-msg" style="text-align: center; width: 100%; color: #999;">No hay estudios pendientes.</p>';
            }

            // Doctor in-progress grid
            const progressGrid = document.querySelector('.studies-grid');
            if (progressGrid && progressGrid.querySelectorAll('.study-card').length === 0 && !progressGrid.querySelector('.ws-empty-msg')) {
                progressGrid.innerHTML = '<p class="ws-empty-msg" style="text-align: center; width: 100%; color: #999;">No tienes estudios en progreso.</p>';
            }
        }

        function refreshPage() {
            // Soft refresh — reload current page content
            window.location.reload();
        }

        // ── Event dispatcher ──

        function handleWSEvent(type, message, data) {
            // Always show toast
            showWSToast(type, message, data);

            switch (type) {
                case 'report_locked':
                    // A study was locked by another doctor → remove from pending (doctors), refresh for patients/associates
                    if (data.study_id) {
                        removeStudyCards(data.study_id);
                    }
                    // For patient/associate dashboards, refresh to show lock overlay
                    if (document.querySelector('.studies-grid')) {
                        setTimeout(refreshPage, 1000);
                    }
                    break;

                case 'report_completed':
                    // A report was completed → remove from in-progress, refresh for patients/assistants
                    if (data.study_id) {
                        removeStudyCards(data.study_id);
                    }
                    // For assistant/patient/associate dashboards, a full refresh gets the updated data
                    {
                        const assistantEl = document.querySelector('.dashboard-layout .tickets-sidebar');
                        const patientEl = document.querySelector('.studies-grid');
                        if (assistantEl || patientEl) {
                            setTimeout(refreshPage, 1500);
                        }
                    }
                    break;

                case 'study_request_created':
                    // New study request → refresh the assistant dashboard to show it
                    {
                        const assistantDashEl = document.querySelector('.dashboard-layout .tickets-sidebar');
                        const allRequestsEl = document.querySelector('.requests-table') || document.querySelector('.table-container');
                        if (assistantDashEl || allRequestsEl) {
                            setTimeout(refreshPage, 1000);
                        }
                    }
                    break;

                case 'new_study':
                    // New study available → refresh doctors' pending list, patients, etc.
                    {
                        const doctorPageEl = document.querySelector('.pending-studies-page');
                        if (doctorPageEl) {
                            setTimeout(refreshPage, 1000);
                        }
                    }
                    break;

                case 'studies_unlocked':
                    // Doctor logged out → their locked studies are available again
                    {
                        const doctorPendingEl = document.querySelector('.pending-studies-page');
                        const studiesGridEl = document.querySelector('.studies-grid');
                        if (doctorPendingEl || studiesGridEl) {
                            setTimeout(refreshPage, 1000);
                        }
                    }
                    break;

                case 'doctor_pending_approval':
                    // Refresh the assistant dashboard to show the new pending doctor
                    {
                        const assistantDashEl = document.querySelector('.dashboard-layout .tickets-sidebar');
                        if (assistantDashEl) {
                            // Instead of building complex DOM, we just refresh the page for the assistant
                            // This ensures the template logic (cards, styling, action URLs) remains consistent
                            setTimeout(refreshPage, 1000);
                        }
                    }
                    break;
                case 'doctor_approved':
                case 'doctor_denied':
                    // Remove the pending doctor card
                    {
                        if (data.doctor_id) {
                            const cardSelector = `[data-doctor-id="${data.doctor_id}"]`;
                            const cardEl = document.querySelector(cardSelector);
                            if (cardEl) {
                                cardEl.classList.add('ws-dom-removing');
                                setTimeout(() => {
                                    cardEl.remove();
                                    const grid = document.getElementById('pendingDoctorsGrid');
                                    if (grid && grid.children.length === 0) {
                                        const section = document.getElementById('pendingDoctorsSection');
                                        if (section) section.remove();
                                    }
                                }, 400);
                            }
                        }
                    }
                    break;

                case 'images_available':
                    // PACS images arrived for a study → refresh to show updated cards
                    {
                        const pendingEl = document.querySelector('.pending-studies-page');
                        const studiesEl = document.querySelector('.studies-grid');
                        if (pendingEl || studiesEl) {
                            setTimeout(refreshPage, 1000);
                        }
                    }
                    break;
            }
        }

        // ── WebSocket connection ──
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/notifications/`;
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 5;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = function () {
                console.log('[WS] Connected');
                reconnectAttempts = 0;
            };

            ws.onmessage = function (e) {
                try {
                    const payload = JSON.parse(e.data);
                    handleWSEvent(payload.type, payload.message, payload.data || {});
                } catch (err) {
                    console.error('[WS] Parse error:', err);
                }
            };

            ws.onclose = function (e) {
                console.log('[WS] Disconnected, code:', e.code);
                if (reconnectAttempts < MAX_RECONNECT) {
                    reconnectAttempts++;
                    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                    console.log(`[WS] Reconnecting in ${delay}ms (attempt ${reconnectAttempts})`);
                    setTimeout(connectWebSocket, delay);
                }
            };

            ws.onerror = function (err) {
                console.error('[WS] Error:', err);
            };
        }

        connectWebSocket();
    })();
</script>
