<!-- Cropper.js Modal Component -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
        display: flex;
        opacity: 1;
    }

    .custom-profile-modal {
        background-color: #ffffff !important;
        background: #ffffff !important;
        border-radius: 16px;
        width: 90%;
        max-width: 600px;
        padding: 24px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        transform: scale(0.95);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        z-index: 10000;
        opacity: 1 !important;
    }

    .modal-overlay.active .custom-profile-modal {
        transform: scale(1);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .modal-header h3 {
        margin: 0;
        font-size: 1.25rem;
        color: var(--text-primary, #334155);
        font-weight: 600;
        font-family: var(--font-family, 'Inter', sans-serif);
    }

    .btn-close-modal {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--text-secondary, #64748B);
        cursor: pointer;
        padding: 4px;
        line-height: 1;
        transition: color 0.2s;
    }

    .btn-close-modal:hover {
        color: var(--text-primary, #0F172A);
    }

    .cropper-container-wrapper {
        width: 100%;
        height: 400px;
        background: #f1f5f9;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px dashed #cbd5e1;
    }

    #imageToCrop {
        max-width: 100%;
        max-height: 100%;
        display: none;
    }

    .upload-fallback-text {
        color: #64748B;
        font-size: 0.95rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .upload-fallback-text svg {
        width: 48px;
        height: 48px;
        color: #94a3b8;
    }

    .modal-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #e2e8f0;
    }

    .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
    }

    .file-input-wrapper input[type=file] {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
    }

    .btn-select-file {
        background: #f1f5f9;
        color: #334155;
        border: 1px solid #cbd5e1;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 500;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-select-file:hover {
        background: #e2e8f0;
    }

    .btn-save-crop {
        background: linear-gradient(135deg, var(--brand-gradient-start, #e83e8c), var(--brand-gradient-end, #6f42c1));
        color: white;
        border: none;
        padding: 8px 24px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-save-crop:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(111, 66, 193, 0.25);
    }

    .btn-save-crop:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .error-msg-size {
        color: var(--error-color, #ef4444);
        font-size: 0.85rem;
        margin-top: 8px;
        display: none;
    }

    /* Override Cropper.js defaults carefully to look nicer */
    .cropper-view-box,
    .cropper-face {
        border-radius: 50%;
        /* Pure circular crop for profile pictures */
    }
</style>

<div class="modal-overlay" id="profileCropperModal">
    <div class="custom-profile-modal">
        <div class="modal-header">
            <h3>Actualizar Foto de Perfil</h3>
            <button class="btn-close-modal" id="closeCropperBtn">&times;</button>
        </div>

        <div class="cropper-container-wrapper" id="cropperWrapper">
            <div class="upload-fallback-text" id="uploadFallbackInfo">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                <span>Selecciona una imagen (Máximo 5MB)</span>
            </div>
            <img id="imageToCrop" src="" alt="Picture to crop">
        </div>
        <div class="error-msg-size" id="fileSizeError">El archivo excede el límite de 5MB. Por favor selecciona una
            imagen más pequeña.</div>

        <div class="modal-actions">
            <div class="file-input-wrapper">
                <button class="btn-select-file">Elegir Archivo</button>
                <input type="file" id="profileFileInput" accept="image/png, image/jpeg, image/jpg">
            </div>
            <button class="btn-save-crop" id="saveCroppedBtn" disabled>Guardar</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('profileCropperModal');
        const closeBtn = document.getElementById('closeCropperBtn');
        const fileInput = document.getElementById('profileFileInput');
        const image = document.getElementById('imageToCrop');
        const saveBtn = document.getElementById('saveCroppedBtn');
        const fallbackInfo = document.getElementById('uploadFallbackInfo');
        const sizeError = document.getElementById('fileSizeError');
        const wrapper = document.getElementById('cropperWrapper');

        let cropper = null;
        const MAX_SIZE_MB = 5;

        // Open modal listener (trigger this from the parent dashboards)
        window.openProfileCropper = function () {
            modal.classList.add('active');
        };

        // Close modal
        function closeModal() {
            modal.classList.remove('active');
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            fileInput.value = '';
            image.src = '';
            image.style.display = 'none';
            fallbackInfo.style.display = 'flex';
            wrapper.style.border = '2px dashed #cbd5e1';
            wrapper.style.display = 'flex';
            saveBtn.disabled = true;
            sizeError.style.display = 'none';
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            const file = files[0];

            // Validate size
            if (file.size > MAX_SIZE_MB * 1024 * 1024) {
                sizeError.style.display = 'block';
                if (cropper) { cropper.destroy(); cropper = null; }
                image.style.display = 'none';
                fallbackInfo.style.display = 'flex';
                saveBtn.disabled = true;
                return;
            }

            sizeError.style.display = 'none';

            // Use native Object URLs to skip heavy base64 processing string rendering
            const url = URL.createObjectURL(file);

            fallbackInfo.style.display = 'none';
            wrapper.style.border = 'none';
            wrapper.style.display = 'block'; // Free the wrapper from flex behaviors
            image.style.display = 'block';
            image.style.maxWidth = '100%';

            if (cropper) {
                // Cropper cleanly swaps image contexts without unbinding canvas elements
                cropper.replace(url);
                saveBtn.disabled = false;
            } else {
                image.onload = () => {
                    // Slight paint yield to let DOM apply exact dimensions to wrapper
                    setTimeout(() => {
                        cropper = new Cropper(image, {
                            aspectRatio: 1,
                            viewMode: 1,
                            dragMode: 'move',
                            autoCropArea: 0.9,
                            restore: false,
                            guides: false,
                            center: false,
                            highlight: false,
                            cropBoxMovable: false,
                            cropBoxResizable: false,
                            toggleDragModeOnDblclick: false,
                            ready: function () {
                                saveBtn.disabled = false;
                            }
                        });
                    }, 50);
                };

                image.src = url;
            }
        });

        // Save Cropped Image
        saveBtn.addEventListener('click', async () => {
            if (!cropper) return;

            // Extract the base64 purely cropped image data into 400x400 standard size
            const canvas = cropper.getCroppedCanvas({
                width: 400,
                height: 400,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            const base64Data = canvas.toDataURL('image/jpeg');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = 'Guardando...';
            saveBtn.disabled = true;

            try {
                // Determine the correct upload endpoint dynamically based on the current user's app (or hit a global endpoint)
                // We'll create a central API view for this in `core/urls.py` called update_profile_picture
                const response = await fetch('/api/update-profile-picture/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        image_data: base64Data
                    })
                });

                const data = await response.json();
                if (data.success) {
                    // Update all visually loaded profile pictures on the page dynamically
                    document.querySelectorAll('.profile-pic-img, .nav-avatar, .user-avatar').forEach(img => {
                        // Append timestamp to bypass browser caching for the new image url
                        if (img.tagName.toLowerCase() === 'img') {
                            img.src = `${data.url}?t=${new Date().getTime()}`;
                        }
                    });
                    closeModal();
                } else {
                    alert('Error saving image: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Connection error occurred while saving the profile picture.');
            } finally {
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    });
</script>
