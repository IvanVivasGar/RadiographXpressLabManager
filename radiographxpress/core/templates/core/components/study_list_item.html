<!-- 
    Study List Item Component 
    Expects context variables:
    - study_url: URL for the detail view
    - title: Patient Name or Main Title
    - date: Date object or string
    - subtitle: Optional subtitle
    - status: Optional status string
-->
<a href="{{ study_url }}" class="study-list-item">
    <div class="study-list-item-info">
        <h3 class="study-list-item-title">{{ title }}</h3>
        <div class="study-list-item-meta">
            {% if date %}
            <span class="study-list-item-date">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                {{ date|date:"d M Y" }}
            </span>
            {% endif %}

            {% if subtitle %}
            <span class="study-list-item-subtitle">{{ subtitle }}</span>
            {% endif %}
        </div>
    </div>

    <div class="study-list-item-actions">
        {% if status %}
        {% if status == 'completed' %}
        <span class="status-badge completed">Completado</span>
        {% elif status == 'pending' %}
        <span class="status-badge pending">Pendiente</span>
        {% endif %}
        {% endif %}

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </div>
</a>
